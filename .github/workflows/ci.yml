name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}

      - name: cargo test
        run: cargo test --all-targets --no-fail-fast

      - name: Install fnm (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
          # The installer may drop the binary in a $HOME location *or* delegate
          # to Homebrew (macOS), which puts it under /opt/homebrew/bin or
          # /usr/local/bin. Probe known dirs, then fall back to PATH.
          for dir in \
            "$HOME/.local/share/fnm" \
            "$HOME/Library/Application Support/fnm" \
            "$HOME/.fnm" \
            "/opt/homebrew/bin" \
            "/usr/local/bin"; do
            if [ -x "$dir/fnm" ]; then
              echo "$dir" >> "$GITHUB_PATH"
              "$dir/fnm" --version
              exit 0
            fi
          done
          if command -v fnm >/dev/null 2>&1; then
            fnm --version
            exit 0
          fi
          echo "fnm binary not found after install" >&2
          exit 1

      - name: Install fnm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $Env:USERPROFILE '.fnm'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $Env:RUNNER_TEMP 'fnm-windows.zip'
          Invoke-WebRequest -UseBasicParsing `
            -Uri 'https://github.com/Schniz/fnm/releases/latest/download/fnm-windows.zip' `
            -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          if (-not (Test-Path (Join-Path $dest 'fnm.exe'))) {
            throw "fnm.exe not present at $dest after extraction"
          }
          # Persist for subsequent workflow steps.
          Add-Content -Path $Env:GITHUB_PATH -Value $dest
          & (Join-Path $dest 'fnm.exe') --version

      - name: E2E (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/e2e.sh

      - name: E2E (Windows)
        if: runner.os == 'Windows'
        run: pwsh -File scripts/e2e.ps1

  # ---------------------------------------------------------------------------
  # Deep end-to-end tests against real community tooling (Vite, TypeScript)
  # via `npm install` / `npx`. These execute arbitrary third-party
  # postinstall scripts, so the job is hardened as follows:
  #
  #   * `permissions:` is overridden to `contents: read` ONLY (no packages,
  #     no id-token, no anything else). The workflow-level default is the
  #     same, but we re-state it per-job to make the least-privilege
  #     intent explicit and to prevent silent escalation if defaults change.
  #   * `actions/checkout` runs with `persist-credentials: false` so the
  #     GITHUB_TOKEN is NOT written to `.git/config` as an http extraheader.
  #   * No `env:` block injects GITHUB_TOKEN, NODE_AUTH_TOKEN, NPM_TOKEN,
  #     or anything else into the step environment.
  #   * The sandbox runner (`bwrap --clearenv` on Linux, `env -i ... +
  #     sandbox-exec` on macOS, allowlisted ProcessStartInfo on Windows)
  #     scrubs the entire env block before any third-party code executes,
  #     and the workload itself asserts that ACTIONS_RUNTIME_TOKEN /
  #     ACTIONS_ID_TOKEN_REQUEST_TOKEN / GITHUB_TOKEN / NODE_AUTH_TOKEN /
  #     NPM_TOKEN are absent before proceeding.
  #   * This job is intentionally NOT a `needs:` dependency of any
  #     publishing workflow (release.yml / nightly.yml), so even a worst-
  #     case sandbox break cannot affect tagged release artifacts.
  # ---------------------------------------------------------------------------
  e2e-deep:
    name: E2E (deep, sandboxed) — ${{ matrix.os }}
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    # Override workflow default: nothing beyond read access to the repo.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # Do NOT persist the GITHUB_TOKEN into .git/config; a sandbox
          # break could otherwise read it from the on-disk repo config.
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-deep-${{ matrix.os }}

      - name: Install bubblewrap (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          bwrap --version
          # Ubuntu 24.04 enables AppArmor's unprivileged user-namespace
          # restriction by default, which makes `bwrap: setting up uid map:
          # Permission denied` on the GitHub runner. The runner is
          # ephemeral, so we relax the sysctl for the duration of the job.
          # Reference:
          #   https://ubuntu.com/blog/ubuntu-23-10-restricted-unprivileged-user-namespaces
          #   https://github.com/containers/bubblewrap/issues/620
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo "current value: $(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns)"
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          # Smoke-test that an unprivileged user namespace can now be set up.
          bwrap --ro-bind / / --unshare-user --uid 0 --gid 0 true

      - name: Install fnm (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
          for dir in \
            "$HOME/.local/share/fnm" \
            "$HOME/Library/Application Support/fnm" \
            "$HOME/.fnm" \
            "/opt/homebrew/bin" \
            "/usr/local/bin"; do
            if [ -x "$dir/fnm" ]; then
              echo "$dir" >> "$GITHUB_PATH"
              "$dir/fnm" --version
              exit 0
            fi
          done
          if command -v fnm >/dev/null 2>&1; then
            fnm --version
            exit 0
          fi
          echo "fnm binary not found after install" >&2
          exit 1

      - name: Install fnm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $Env:USERPROFILE '.fnm'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $Env:RUNNER_TEMP 'fnm-windows.zip'
          Invoke-WebRequest -UseBasicParsing `
            -Uri 'https://github.com/Schniz/fnm/releases/latest/download/fnm-windows.zip' `
            -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          if (-not (Test-Path (Join-Path $dest 'fnm.exe'))) {
            throw "fnm.exe not present at $dest after extraction"
          }
          Add-Content -Path $Env:GITHUB_PATH -Value $dest
          & (Join-Path $dest 'fnm.exe') --version

      - name: Deep E2E (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/e2e-deep.sh

      - name: Deep E2E (Windows)
        if: runner.os == 'Windows'
        # CI=true is already set by GHA; the script's safety gate accepts it.
        # The script clears the child process env via ProcessStartInfo.
        run: pwsh -File scripts/e2e-deep.ps1
