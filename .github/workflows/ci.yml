name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}

      - name: cargo test
        run: cargo test --all-targets --no-fail-fast

      - name: Install fnm (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
          # The installer may drop the binary in a $HOME location *or* delegate
          # to Homebrew (macOS), which puts it under /opt/homebrew/bin or
          # /usr/local/bin. Probe known dirs, then fall back to PATH.
          for dir in \
            "$HOME/.local/share/fnm" \
            "$HOME/Library/Application Support/fnm" \
            "$HOME/.fnm" \
            "/opt/homebrew/bin" \
            "/usr/local/bin"; do
            if [ -x "$dir/fnm" ]; then
              echo "$dir" >> "$GITHUB_PATH"
              "$dir/fnm" --version
              exit 0
            fi
          done
          if command -v fnm >/dev/null 2>&1; then
            fnm --version
            exit 0
          fi
          echo "fnm binary not found after install" >&2
          exit 1

      - name: Install fnm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $Env:USERPROFILE '.fnm'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $Env:RUNNER_TEMP 'fnm-windows.zip'
          Invoke-WebRequest -UseBasicParsing `
            -Uri 'https://github.com/Schniz/fnm/releases/latest/download/fnm-windows.zip' `
            -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          if (-not (Test-Path (Join-Path $dest 'fnm.exe'))) {
            throw "fnm.exe not present at $dest after extraction"
          }
          # Persist for subsequent workflow steps.
          Add-Content -Path $Env:GITHUB_PATH -Value $dest
          & (Join-Path $dest 'fnm.exe') --version

      - name: E2E (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/e2e.sh

      - name: E2E (Windows)
        if: runner.os == 'Windows'
        run: pwsh -File scripts/e2e.ps1
